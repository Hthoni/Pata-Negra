<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pata Negra — Embarque</title>
<style>
  :root { --accent:#8B1C1C; --accent-lt:#FDF0F0; --bg:#F7F5F2; --surface:#fff; --border:#E3DED7; --text:#2b2b2b; --radius:8px; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--text); }
  header { background:var(--accent); color:#fff; padding:0 24px; height:56px; display:flex; align-items:center; gap:12px; }
  .logo { width:34px;height:34px;border-radius:8px;background:#fff;color:var(--accent);font-weight:800;font-size:14px;display:flex;align-items:center;justify-content:center; }
  header h1 { font-size:17px; font-weight:700; }
  .header-actions { margin-left:auto; display:flex; gap:8px; }
  .btn-header { font-family:inherit; height:34px; min-width:100px; display:inline-flex; align-items:center; justify-content:center; padding:0 14px; border-radius:var(--radius); border:1px solid rgba(255,255,255,.4); background:rgba(255,255,255,.15); color:#fff; font-size:12px; font-weight:600; cursor:pointer; text-decoration:none; }
  main { max-width:820px; margin:0 auto; padding:22px 16px 60px; }
  .toolbar { display:flex; align-items:center; gap:12px; margin-bottom:14px; flex-wrap:wrap; }
  .stat-badge { background:var(--accent-lt); color:var(--accent); padding:4px 12px; border-radius:20px; font-size:13px; font-weight:600; }
  .ult-edicao { font-size:12px; color:#888; margin-left:auto; }
  .ult-edicao b { color:#555; }

  table { width:100%; border-collapse:collapse; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
  thead th { background:var(--accent); color:#fff; font-size:12px; font-weight:700; text-align:left; padding:11px 14px; }
  thead th.num { text-align:right; }
  /* cabeçalho da coluna estoque = botão editar/salvar */
  th.th-estoque { width:150px; padding:6px 10px; }
  /* botão editar/salvar ocupa a largura da coluna, visual dos botões de navegação */
  th.th-estoque button { width:100%; font-family:inherit; height:30px; display:inline-flex; align-items:center; justify-content:center; padding:0 8px; border-radius:var(--radius); border:1px solid rgba(255,255,255,.5); background:rgba(255,255,255,.18); color:#fff; font-size:12px; font-weight:700; cursor:pointer; white-space:nowrap; }
  th.th-estoque button:hover { background:rgba(255,255,255,.3); }
  /* em edição: vira sólido branco com texto vinho (estado "salvar") */
  th.th-estoque.editando button { background:#fff; color:var(--accent); border-color:#fff; }

  tbody td { padding:8px 14px; font-size:14px; border-bottom:1px solid #f0ece6; }
  tbody tr:last-child td { border-bottom:none; }
  .nome { font-weight:500; }
  .num { text-align:right; font-variant-numeric:tabular-nums; }
  .c-estoque { font-weight:600; color:#333; background:#faf7f2; }
  .c-emrota { font-weight:600; }
  .c-falta { font-weight:800; font-size:16px; }
  .c-falta.pos { color:var(--accent); }
  .c-falta.zero { color:#cfcfcf; }
  .c-estoque input { width:92px; text-align:right; font-family:inherit; font-size:14px; font-weight:600; padding:4px 6px; border:1px solid var(--accent); border-radius:5px; background:#fff; }
  tbody.editando .c-estoque { background:var(--accent-lt); }

  tfoot td { padding:14px; font-weight:800; background:#2b2b2b; color:#fff; font-size:14px; }
  tfoot td.rotulo { text-align:right; }
  tfoot td.total { text-align:right; font-variant-numeric:tabular-nums; background:var(--accent); font-size:22px; }
</style></head>
<body>
<header><div class="logo">PN</div><h1>Pata Negra — Embarque</h1>
  <div class="header-actions">
    <a href="index.html" class="btn-header">Criar Pedido</a>
    <a href="mapa.html" class="btn-header">Mapa</a>
    <a href="pedidos.html" class="btn-header">Pedidos</a>
    <a href="entregas.html" class="btn-header">Entregas</a>
  </div>
</header>
<main>
  <div class="toolbar">
    <span class="stat-badge" id="badge">falta produzir: —</span>
    <span class="ult-edicao">última edição do estoque: <b id="ult-data">—</b></span>
  </div>
  <table>
    <thead><tr>
      <th>Produto</th>
      <th class="num th-estoque" id="th-estoque"><button id="b-toggle" onclick="toggle()">Editar estoque</button></th>
      <th class="num" style="width:120px">Em rota (kg)</th>
      <th class="num" style="width:140px">Falta produzir</th>
    </tr></thead>
    <tbody id="corpo"></tbody>
    <tfoot><tr>
      <td class="rotulo" colspan="3">TOTAL A PRODUZIR</td>
      <td class="total" id="tot">—</td>
    </tr></tfoot>
  </table>
  <div style="text-align:right;margin-top:8px">
    <button id="b-cancel" onclick="cancelar()" style="display:none;font-family:inherit;height:32px;padding:0 16px;border-radius:8px;border:1px solid #bbb;background:#fff;color:#777;font-size:12px;font-weight:600;cursor:pointer">Cancelar edição</button>
  </div>
</main>
<script>
  var SERVER_URL = 'https://pata-negra-staging-784065203515.us-central1.run.app';

  var linhas = [];          // [{nome, estoque, emRota, falta}]
  var editando = false, backup = null, atualizadoEm = null;

  function fmt(v){ return v ? Number(v).toLocaleString('pt-BR') : ''; }
  function fmtT(v){ return v ? Number(v).toLocaleString('pt-BR') : '0'; }
  function fmtData(iso){
    if(!iso) return '—';
    var d = new Date(iso); if(isNaN(d)) return '—';
    return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  }
  function faltaDe(l){ var f = (l.emRota||0) - (l.estoque||0); return f > 0 ? f : 0; }

  function render(){
    var corpo = document.getElementById('corpo');
    var html = '', total = 0;
    linhas.forEach(function(l, idx){
      var f = faltaDe(l); total += f;
      var cell = editando
        ? '<input type="number" min="0" step="1" value="'+(l.estoque||'')+'" data-i="'+idx+'" onchange="setEstoque(this)">'
        : fmt(l.estoque);
      html += '<tr>' +
        '<td class="nome">'+l.nome+'</td>' +
        '<td class="num c-estoque">'+cell+'</td>' +
        '<td class="num c-emrota">'+fmt(l.emRota)+'</td>' +
        '<td class="num c-falta '+(f>0?'pos':'zero')+'">'+(f>0?fmt(f):'—')+'</td>' +
      '</tr>';
    });
    corpo.innerHTML = html;
    corpo.className = editando ? 'editando' : '';
    document.getElementById('tot').textContent = fmtT(total) + ' kg';
    document.getElementById('badge').textContent = 'falta produzir: ' + fmtT(total) + ' kg';
    document.getElementById('ult-data').textContent = fmtData(atualizadoEm);
  }
  function setEstoque(inp){ linhas[+inp.dataset.i].estoque = Number(inp.value)||0; }

  function toggle(){
    var th = document.getElementById('th-estoque');
    var btn = document.getElementById('b-toggle');
    var cancel = document.getElementById('b-cancel');
    if(!editando){
      editando = true; backup = linhas.map(function(l){ return l.estoque; });
      btn.textContent = 'Salvar estoque'; th.classList.add('editando'); cancel.style.display='';
      render();
    } else {
      salvar();
    }
  }

  async function salvar(){
    var itens = {};
    linhas.forEach(function(l){ if(l.estoque) itens[l.nome] = l.estoque; });
    var btn = document.getElementById('b-toggle');
    btn.textContent = 'Salvando…'; btn.disabled = true;
    try{
      var resp = await fetch(SERVER_URL + '/estoque', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ itens: itens })
      });
      var d = await resp.json();
      if(!resp.ok || d.erro){ alert('Erro ao salvar: ' + (d.erro||resp.status)); btn.disabled=false; btn.textContent='Salvar estoque'; return; }
      atualizadoEm = d.atualizadoEm;
      editando = false; btn.disabled = false;
      btn.textContent = 'Editar estoque';
      document.getElementById('th-estoque').classList.remove('editando');
      document.getElementById('b-cancel').style.display='none';
      render();
    }catch(e){ alert('Erro de conexão: ' + e.message); btn.disabled=false; btn.textContent='Salvar estoque'; }
  }

  function cancelar(){
    if(backup) linhas.forEach(function(l,i){ l.estoque = backup[i]; });
    editando = false;
    document.getElementById('b-toggle').textContent = 'Editar estoque';
    document.getElementById('th-estoque').classList.remove('editando');
    document.getElementById('b-cancel').style.display='none';
    render();
  }

  async function carregar(){
    try{
      var d = await fetch(SERVER_URL + '/embarque').then(function(r){ return r.json(); });
      linhas = d.linhas || [];
      atualizadoEm = d.atualizadoEm;
      render();
    }catch(e){
      document.getElementById('corpo').innerHTML = '<tr><td colspan="4" style="padding:30px;text-align:center;color:#999">Erro ao carregar: '+e.message+'</td></tr>';
    }
  }
  carregar();
</script>
</body></html>
