<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pata Negra — Mapa de Entregas</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --accent:#8B1C1C; --accent-lt:#FDF0F0; --bg:#F7F5F2;
      --surface:#fff; --border:#E2DDD8; --text:#1A1714;
      --radius:8px;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family: system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; }
    header { background:var(--accent); color:#fff; padding:0 24px; height:56px; display:flex; align-items:center; gap:12px; box-shadow:0 2px 8px rgba(139,28,28,.25); flex-shrink:0; }
    .logo { width:30px; height:30px; background:rgba(255,255,255,.18); border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:11px; }
    header h1 { font-size:15px; font-weight:600; }
    .header-actions { margin-left:auto; display:flex; gap:8px; align-items:center; }
    .btn-header { padding:6px 14px; border-radius:var(--radius); border:1px solid rgba(255,255,255,.4); background:rgba(255,255,255,.15); color:#fff; font-size:12px; font-weight:600; cursor:pointer; text-decoration:none; transition:background .13s; }
    .btn-header:hover { background:rgba(255,255,255,.28); }

    .toolbar { background:var(--surface); border-bottom:1px solid var(--border); padding:10px 20px; display:flex; align-items:center; gap:16px; flex-shrink:0; flex-wrap:wrap; }
    .toolbar h2 { font-size:14px; font-weight:600; }
    .legenda { display:flex; gap:12px; margin-left:auto; flex-wrap:wrap; }
    .leg-item { display:flex; align-items:center; gap:5px; font-size:12px; color:#555; }
    .leg-dot { width:12px; height:12px; border-radius:50%; border:2px solid rgba(0,0,0,.2); }
    .stat-badge { background:var(--accent-lt); color:var(--accent); padding:3px 10px; border-radius:20px; font-size:12px; font-weight:600; }
    #btn-refresh { padding:6px 12px; border-radius:var(--radius); border:1px solid var(--border); background:#fff; font-size:12px; cursor:pointer; }
    #btn-refresh:hover { background:var(--bg); }

    /* Filtro por cliente */
    .filtro-wrap { position:relative; }
    #btn-filtro { padding:6px 12px; border-radius:var(--radius); border:1px solid var(--border); background:#fff; font-size:12px; cursor:pointer; }
    #btn-filtro:hover { background:var(--bg); }
    .filtro-dropdown { position:absolute; top:calc(100% + 6px); left:0; background:#fff; border:1px solid var(--border); border-radius:var(--radius); box-shadow:0 4px 16px rgba(0,0,0,.12); padding:8px; min-width:200px; max-height:320px; overflow:auto; z-index:600; display:none; }
    .filtro-head { display:flex; justify-content:space-between; align-items:center; gap:8px; padding:2px 8px 8px; border-bottom:1px solid var(--border); margin-bottom:4px; }
    .filtro-head .titulo { font-size:11px; color:#888; font-weight:700; letter-spacing:.04em; }
    .filtro-head button { background:none; border:none; color:var(--accent); font-size:11px; cursor:pointer; font-weight:600; padding:2px 4px; }
    .filtro-head button:hover { text-decoration:underline; }
    .filtro-dropdown label { display:flex; align-items:center; gap:8px; padding:6px 8px; font-size:13px; cursor:pointer; border-radius:6px; }
    .filtro-dropdown label:hover { background:var(--bg); }
    .filtro-vazio { padding:8px; font-size:12px; color:#888; }

    #map { flex:1; }

    /* Popup customizado */
    .popup-content { min-width:200px; }
    .popup-cliente { font-weight:700; font-size:14px; margin-bottom:2px; }
    .popup-filial { font-size:12px; color:#666; margin-bottom:8px; }
    .popup-row { display:flex; justify-content:space-between; font-size:12px; padding:3px 0; border-top:1px solid #eee; }
    .popup-label { color:#888; }
    .popup-valor { font-weight:600; }
    .popup-idade { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:700; margin-top:6px; }
    .popup-acoes { display:flex; gap:6px; margin-top:10px; }
    .popup-btn { flex:1; padding:6px 8px; border-radius:6px; border:1px solid var(--border); background:#fff; font-size:11px; font-weight:600; cursor:pointer; }
    .popup-btn-pdf { color:var(--accent); border-color:var(--accent); }
    .popup-btn-pdf:hover { background:var(--accent-lt); }
    .popup-btn-del { color:#c0392b; border-color:#e6b0aa; }
    .popup-btn-del:hover { background:#fdedec; }

    /* Loading */
    #loading { position:fixed; inset:0; background:rgba(255,255,255,.85); display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px; z-index:9999; }
    .spinner { width:40px; height:40px; border:4px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    #loading p { font-size:14px; color:#666; }

    /* Sem dados */
    #sem-dados { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:#fff; padding:32px; border-radius:var(--radius); box-shadow:0 4px 24px rgba(0,0,0,.1); text-align:center; z-index:500; display:none; }
    #sem-dados h3 { font-size:16px; margin-bottom:8px; }
    #sem-dados p { font-size:13px; color:#888; }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>Carregando romaneios...</p>
</div>

<header>
  <div class="logo">PN</div>
  <h1>Pata Negra — Mapa de Entregas</h1>
  <div class="header-actions">
    <a href="index.html" class="btn-header">← Voltar</a>
    <a href="entregas.html" class="btn-header">📋 Gerenciar Entregas</a>
  </div>
</header>

<div class="toolbar">
  <h2>Pedidos Pendentes</h2>
  <span class="stat-badge" id="total-badge">0 pedidos</span>
  <button id="btn-refresh" onclick="carregarRomaneios()">↺ Atualizar</button>
  <div class="filtro-wrap">
    <button id="btn-filtro" onclick="toggleFiltro(event)">⛃ Clientes</button>
    <div class="filtro-dropdown" id="filtro-dropdown"></div>
  </div>
  <div class="legenda">
    <div class="leg-item"><div class="leg-dot" style="background:#27ae60"></div> &lt; 48h</div>
    <div class="leg-item"><div class="leg-dot" style="background:#f1c40f"></div> 48–96h</div>
    <div class="leg-item"><div class="leg-dot" style="background:#e67e22"></div> 96–120h</div>
    <div class="leg-item"><div class="leg-dot" style="background:#e74c3c"></div> &gt; 120h</div>
  </div>
</div>

<div id="map" style="position:relative;">
  <div id="sem-dados">
    <h3>Nenhum pedido pendente</h3>
    <p>Todos os romaneios foram entregues!</p>
  </div>
</div>

<script>
  var SERVER_URL = 'https://pata-negra-staging-784065203515.us-central1.run.app';
  var map = L.map('map').setView([-22.95, -43.35], 11);
  var markers = [];
  var romaneios = [];                 // todos os romaneios carregados
  var clientesDesmarcados = new Set(); // clientes ocultados pelo filtro

  L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
    attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>, tiles by <a href="https://hot.openstreetmap.org/">HOT</a>',
    maxZoom:19
  }).addTo(map);

  function idadeHoras(dataGeracao) {
    var d = new Date(dataGeracao);
    return (Date.now() - d.getTime()) / 3600000;
  }

  function corPorIdade(horas) {
    if (horas < 48)  return { cor:'#27ae60', label:'Recente', bg:'#d5f5e3', txt:'#1e8449' };
    if (horas < 96)  return { cor:'#f1c40f', label:'Atenção', bg:'#fef9e7', txt:'#b7950b' };
    if (horas < 120) return { cor:'#e67e22', label:'Atrasado', bg:'#fdebd0', txt:'#a04000' };
    return              { cor:'#e74c3c', label:'Crítico',  bg:'#fdedec', txt:'#922b21' };
  }

  // Tipo do pedido vem da coluna O do Perfil: filiais têm número; central traz o texto "Central".
  function ehCentral(rom) {
    return String((rom && rom.numero) || '').trim().toLowerCase() === 'central';
  }

  function criarIcone(cor, corBolinha) {
    corBolinha = corBolinha || '#fff';
    var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="38" viewBox="0 0 28 38">' +
      '<path d="M14 0C6.27 0 0 6.27 0 14c0 9.25 14 24 14 24S28 23.25 28 14C28 6.27 21.73 0 14 0z" fill="' + cor + '" stroke="#fff" stroke-width="2"/>' +
      '<circle cx="14" cy="14" r="6" fill="' + corBolinha + '" fill-opacity="0.9"/>' +
      '</svg>';
    return L.divIcon({
      className: '',
      html: svg,
      iconSize: [28, 38],
      iconAnchor: [14, 38],
      popupAnchor: [0, -40]
    });
  }

  function formatarData(str) {
    if (!str) return '—';
    if (str.includes('T')) {
      var d = new Date(str);
      return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
    }
    return str;
  }

  function montarPopup(rom, c, horas) {
    return '<div class="popup-content">' +
      '<div class="popup-cliente">' + (rom.clienteNome || rom.cliente) + '</div>' +
      '<div class="popup-filial">' + (rom.filial || '—') + '</div>' +
      '<div class="popup-row"><span class="popup-label">Pedido</span><span class="popup-valor">' + (rom.pedidoNum || '—') + '</span></div>' +
      '<div class="popup-row"><span class="popup-label">Data pedido</span><span class="popup-valor">' + (rom.dataPedido || '—') + '</span></div>' +
      '<div class="popup-row"><span class="popup-label">Gerado em</span><span class="popup-valor">' + formatarData(rom.dataGeracao) + '</span></div>' +
      '<div class="popup-row"><span class="popup-label">Kg planejados</span><span class="popup-valor">' + (rom.kgPlanejados || '—') + ' kg</span></div>' +
      '<span class="popup-idade" style="background:' + c.bg + ';color:' + c.txt + '">' + c.label + ' — ' + Math.round(horas) + 'h</span>' +
      '<div class="popup-acoes">' +
        '<button class="popup-btn popup-btn-pdf" onclick="verPdf(\'' + rom.id + '\')">📄 Ver PDF</button>' +
        '<button class="popup-btn popup-btn-del" onclick="excluirPino(\'' + rom.id + '\')">🗑 Excluir</button>' +
      '</div>' +
      '</div>';
  }

  // Desenha os marcadores respeitando o filtro de clientes.
  // ajustarZoom só no carregamento — evita o mapa "pular" a cada toggle.
  function renderMarkers(ajustarZoom) {
    markers.forEach(function(m) { map.removeLayer(m); });
    markers = [];

    var visiveis = romaneios.filter(function(rom) {
      return rom.lat && rom.lng && !clientesDesmarcados.has(rom.cliente);
    });

    visiveis.forEach(function(rom) {
      var horas = idadeHoras(rom.dataGeracao);
      var c = corPorIdade(horas);
      var corBolinha = ehCentral(rom) ? '#000' : '#fff';
      var marker = L.marker([rom.lat, rom.lng], { icon: criarIcone(c.cor, corBolinha) });
      marker.bindPopup(montarPopup(rom, c, horas));
      marker.addTo(map);
      markers.push(marker);
    });

    document.getElementById('total-badge').textContent = visiveis.length + ' pedido' + (visiveis.length !== 1 ? 's' : '');
    document.getElementById('sem-dados').style.display = romaneios.length === 0 ? 'block' : 'none';

    if (ajustarZoom && markers.length > 0) {
      var group = L.featureGroup(markers);
      map.fitBounds(group.getBounds().pad(0.1));
    }
  }

  // ── Filtro por cliente ──────────────────────────────────────────────
  function montarFiltro(data) {
    var nomes = {};
    data.forEach(function(r) { if (r.cliente) nomes[r.cliente] = r.clienteNome || r.cliente; });
    var ids = Object.keys(nomes).sort(function(a, b) { return nomes[a].localeCompare(nomes[b]); });
    var dd = document.getElementById('filtro-dropdown');

    // descarta do "desmarcados" clientes que já não têm pedido
    clientesDesmarcados.forEach(function(cid) { if (!nomes[cid]) clientesDesmarcados.delete(cid); });

    if (ids.length === 0) {
      dd.innerHTML = '<div class="filtro-vazio">Nenhum cliente com pedido</div>';
      return;
    }
    var html = '<div class="filtro-head"><span class="titulo">CLIENTES</span>' +
      '<span><button onclick="filtroTodos(true)">Todos</button><button onclick="filtroTodos(false)">Nenhum</button></span></div>';
    ids.forEach(function(cid) {
      var checked = clientesDesmarcados.has(cid) ? '' : 'checked';
      html += '<label><input type="checkbox" value="' + cid + '" ' + checked + ' onchange="toggleCliente(this)"> ' + nomes[cid] + '</label>';
    });
    dd.innerHTML = html;
  }

  function toggleCliente(cb) {
    if (cb.checked) clientesDesmarcados.delete(cb.value);
    else clientesDesmarcados.add(cb.value);
    renderMarkers(false);
  }

  function filtroTodos(marcar) {
    var cbs = document.getElementById('filtro-dropdown').querySelectorAll('input[type=checkbox]');
    cbs.forEach(function(cb) {
      cb.checked = marcar;
      if (marcar) clientesDesmarcados.delete(cb.value);
      else clientesDesmarcados.add(cb.value);
    });
    renderMarkers(false);
  }

  function toggleFiltro(e) {
    if (e) e.stopPropagation();
    var dd = document.getElementById('filtro-dropdown');
    dd.style.display = dd.style.display === 'block' ? 'none' : 'block';
  }

  document.addEventListener('click', function(e) {
    var wrap = document.querySelector('.filtro-wrap');
    if (wrap && !wrap.contains(e.target)) {
      document.getElementById('filtro-dropdown').style.display = 'none';
    }
  });

  // ── Ações do popup ──────────────────────────────────────────────────
  function verPdf(id) {
    window.open(SERVER_URL + '/romaneio-pdf/' + id, '_blank');
  }

  function excluirPino(id) {
    var rom = null;
    for (var i = 0; i < romaneios.length; i++) { if (romaneios[i].id === id) { rom = romaneios[i]; break; } }
    var nome = rom ? (rom.filial || rom.clienteNome || rom.cliente) : id;
    if (!confirm('Excluir o pedido da filial ' + nome + '?')) return;

    fetch(SERVER_URL + '/romaneio/' + id, { method:'DELETE' })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.ok) {
          romaneios = romaneios.filter(function(r) { return r.id !== id; });
          map.closePopup();
          montarFiltro(romaneios);
          renderMarkers(false);
        } else {
          alert('Erro: ' + (data.erro || 'Falha ao excluir'));
        }
      })
      .catch(function(e) { alert('Erro: ' + e.message); });
  }

  // ── Carregamento ────────────────────────────────────────────────────
  function carregarRomaneios() {
    document.getElementById('loading').style.display = 'flex';
    fetch(SERVER_URL + '/romaneios')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        document.getElementById('loading').style.display = 'none';
        romaneios = data || [];
        montarFiltro(romaneios);
        renderMarkers(true);
      })
      .catch(function(e) {
        document.getElementById('loading').style.display = 'none';
        alert('Erro ao carregar romaneios: ' + e.message);
      });
  }

  carregarRomaneios();
</script>
</body>
</html>
