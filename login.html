</style></head><body>
  <div class="palco">
    <input class="campo" id="u" type="text" autocomplete="username" autofocus>
    <input class="campo" id="p" type="password" autocomplete="current-password">
    <button class="btn" onclick="entrar()">Entrar</button>
    <div class="msg" id="msg"></div>
  </div>
<script>
  var SERVER_URL='https://pata-negra-784065203515.us-central1.run.app';
  // se já tem sessão válida, vai direto pro sistema
  (function(){
    var t=localStorage.getItem('pn_token');
    if(t){ fetch(SERVER_URL+'/me',{headers:{'Authorization':'Bearer '+t}})
      .then(function(r){ if(r.ok) location.href='index.html'; }).catch(function(){}); }
  })();
  function msg(t){ var m=document.getElementById('msg'); m.textContent=t; m.style.display='block'; }
  async function entrar(){
    var u=document.getElementById('u').value.trim(), p=document.getElementById('p').value;
    if(!u||!p){ msg('Preencha login e senha.'); return; }
    msg('Entrando…');
    try{
      var r=await fetch(SERVER_URL+'/login',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({usuario:u,senha:p})});
      var d=await r.json();
      if(!r.ok){ msg(d.erro||'Falha no login'); return; }
      localStorage.setItem('pn_token', d.token);
      localStorage.setItem('pn_usuario', d.usuario);
      localStorage.setItem('pn_papel', d.papel);
      location.href='index.html';
    }catch(e){ msg('Erro de conexão'); }
  }
  document.getElementById('p').addEventListener('keydown',function(e){if(e.key==="Enter")entrar();});
  document.getElementById('u').addEventListener('keydown',function(e){if(e.key==="Enter")document.getElementById('p').focus();});
</script>
